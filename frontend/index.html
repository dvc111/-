<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>微观检索与 GNN 推理</title>
  <style>
    :root {
      --accent: #4f46e5;
      --accent-soft: #eef2ff;
      --text: #172033;
      --muted: #687386;
      --line: #e8ebf1;
      --surface: #ffffff;
      --background: #f6f7fb;
      --danger: #b42318;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background: var(--background);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
    }

    .header {
      padding: 30px 20px 26px;
      color: #fff;
      text-align: center;
      background: var(--accent);
    }

    .header h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 650;
    }

    .header p {
      margin: 8px 0 0;
      color: rgba(255, 255, 255, .78);
      font-size: 13px;
    }

    .wrap {
      width: min(680px, 100%);
      margin: 0 auto;
      padding: 18px 16px 28px;
    }

    .card {
      margin-bottom: 14px;
      padding: 20px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .card-title {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .question {
      font-size: 17px;
      font-weight: 600;
      line-height: 1.6;
    }

    .summary {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 5px 9px;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
      font-size: 12px;
    }

    .candidate {
      display: grid;
      grid-template-columns: minmax(90px, 130px) 1fr 48px;
      gap: 12px;
      align-items: center;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
    }

    .candidate:last-child { border-bottom: 0; }
    .candidate-name { overflow-wrap: anywhere; font-size: 14px; font-weight: 600; }

    .bar-track {
      height: 7px;
      overflow: hidden;
      background: #eceef4;
      border-radius: 999px;
    }

    .bar {
      height: 100%;
      background: var(--accent);
      border-radius: inherit;
      transition: width .4s ease;
    }

    .probability { color: var(--muted); font-size: 13px; text-align: right; }

    .path { padding: 4px 0 13px; }
    .path + .path { padding-top: 14px; border-top: 1px solid var(--line); }
    .path:last-child { padding-bottom: 2px; }

    .path-answer {
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 650;
    }

    .path-content {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 13px;
      line-height: 1.7;
    }

    .entity { font-weight: 600; }
    .relation { color: var(--muted); }
    .arrow { color: #adb3c0; }

    .empty,
    .state {
      padding: 24px 8px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .error { color: var(--danger); }

    .spinner {
      display: block;
      width: 26px;
      height: 26px;
      margin: 0 auto 10px;
      border: 3px solid #e5e7f1;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .button {
      width: 100%;
      padding: 12px 16px;
      color: #fff;
      background: var(--accent);
      border: 0;
      border-radius: 9px;
      font: inherit;
      font-size: 14px;
      font-weight: 650;
      cursor: pointer;
    }

    .button:hover { background: #4338ca; }
    .button:disabled { cursor: wait; opacity: .58; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 520px) {
      .header { padding-top: 24px; }
      .header h1 { font-size: 20px; }
      .card { padding: 17px; }
      .candidate { grid-template-columns: minmax(80px, 105px) 1fr 44px; gap: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .bar, .spinner { transition: none; animation: none; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1>微观检索与 GNN 推理</h1>
    <p>DDE 证据筛选 · R-GCN 候选排序 · 可解释路径</p>
  </header>

  <main class="wrap">
    <section class="card" aria-labelledby="question-title">
      <div class="card-title" id="question-title">用户问题</div>
      <div class="question" id="question-text">正在加载…</div>
      <div class="summary" id="summary" hidden></div>
    </section>

    <div id="result" aria-live="polite"></div>
    <button class="button" id="rerun-button" type="button">重新推理</button>
  </main>

  <script>
    const questionText = document.getElementById("question-text");
    const summary = document.getElementById("summary");
    const result = document.getElementById("result");
    const rerunButton = document.getElementById("rerun-button");

    function element(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }

    function showLoading() {
      const card = element("div", "card state");
      card.append(element("span", "spinner"), document.createTextNode("正在运行推理…"));
      result.replaceChildren(card);
    }

    function showError(message) {
      const card = element("div", "card state error", `请求失败：${message}`);
      result.replaceChildren(card);
    }

    function renderSummary(candidateCount, pathCount) {
      summary.replaceChildren(
        element("span", "tag", `${candidateCount} 个候选答案`),
        element("span", "tag", `${pathCount} 条推理路径`)
      );
      summary.hidden = false;
    }

    function renderCandidates(candidates) {
      const card = element("section", "card");
      card.append(element("div", "card-title", "候选答案"));

      if (!candidates.length) {
        card.append(element("div", "empty", "暂未找到候选答案"));
        return card;
      }

      candidates.forEach((candidate) => {
        const probability = Math.min(1, Math.max(0, Number(candidate.prob) || 0));
        const row = element("div", "candidate");
        const track = element("div", "bar-track");
        const bar = element("div", "bar");
        bar.style.width = `${(probability * 100).toFixed(1)}%`;
        track.append(bar);
        row.append(
          element("div", "candidate-name", candidate.label || candidate.entity_id || "未知实体"),
          track,
          element("div", "probability", `${(probability * 100).toFixed(1)}%`)
        );
        card.append(row);
      });

      return card;
    }

    function renderPathNodes(container, nodes) {
      nodes.forEach((node, index) => {
        if (index > 0) container.append(element("span", "arrow", "→"));
        if (node.entity_id) {
          container.append(element("span", "entity", node.label || node.entity_id));
        } else if (node.relation_id) {
          container.append(element("span", "relation", node.label || node.relation_id));
        }
      });
    }

    function renderPaths(paths) {
      const card = element("section", "card");
      card.append(element("div", "card-title", "推理路径"));

      if (!paths.length) {
        card.append(element("div", "empty", "暂未生成可解释路径"));
        return card;
      }

      paths.forEach((path, index) => {
        const nodes = Array.isArray(path.path) ? path.path : [];
        const answer = nodes.find((node) => node.entity_id === path.answer_entity_id);
        const item = element("div", "path");
        item.append(element("div", "path-answer", `${index + 1}. ${answer?.label || path.answer_entity_id || "候选答案"}`));
        const content = element("div", "path-content");
        renderPathNodes(content, nodes);
        item.append(content);
        card.append(item);
      });

      return card;
    }

    async function runInference() {
      rerunButton.disabled = true;
      summary.hidden = true;
      showLoading();

      try {
        const response = await fetch("/api/infer", { headers: { Accept: "application/json" } });
        if (!response.ok) throw new Error(`服务器返回 ${response.status}`);

        const data = await response.json();
        const candidates = Array.isArray(data.candidates) ? data.candidates : [];
        const paths = Array.isArray(data.paths) ? data.paths : [];

        questionText.textContent = data.question || "未提供问题文本";
        renderSummary(candidates.length, paths.length);
        result.replaceChildren(renderCandidates(candidates), renderPaths(paths));
      } catch (error) {
        showError(error instanceof Error ? error.message : "未知错误");
      } finally {
        rerunButton.disabled = false;
      }
    }

    rerunButton.addEventListener("click", runInference);
    runInference();
  </script>
</body>
</html>
