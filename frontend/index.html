<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>微观+GNN 推理系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e}
.header{background:linear-gradient(135deg,#667eea,#764ba2);padding:28px 20px;text-align:center}
.header h1{color:#fff;font-size:20px;font-weight:600}
.header p{color:rgba(255,255,255,.65);font-size:13px;margin-top:5px}
.wrap{max-width:640px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:10px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.label{font-size:12px;font-weight:600;color:#667eea;letter-spacing:.5px;margin-bottom:10px}
.qtext{font-size:17px;font-weight:500;line-height:1.5}
.row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f5}
.row:last-child{border-bottom:none}
.name{flex:0 0 110px;font-size:14px;font-weight:500}
.barbg{flex:1;height:7px;background:#e8e8f0;border-radius:4px;margin:0 10px;overflow:hidden}
.bar{height:100%;border-radius:4px;transition:width .6s ease}
.pct{flex:0 0 42px;text-align:right;font-size:13px;color:#666}

.ptop{font-weight:600;font-size:13px;color:#764ba2;margin-bottom:5px}
.pbody{display:flex;flex-wrap:wrap;align-items:center;gap:3px;font-size:13px}
.e{color:#1a1a2e;font-weight:500}
.r{color:#888;font-style:italic;font-size:12px}
.ar{color:#ccc;font-size:14px}
.psep{height:1px;background:#f0f0f5;margin:8px 0}

.btn{display:block;width:100%;padding:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.88}
.btn:disabled{opacity:.5;cursor:not-allowed}

.lo{text-align:center;padding:30px 0;color:#888;font-size:14px}
.sp{display:inline-block;width:28px;height:28px;border:3px solid #e0e0f0;border-top-color:#667eea;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="header">
  <h1>✦ 微观 + GNN 推理系统</h1>
  <p>DDE 有向距离编码 · R-GCN 图神经网络 · 双向 BFS 路径</p>
</div>
<div class="wrap">
  <div class="card"><div class="label">❓ 问题</div><div class="qtext" id="qt">加载中...</div></div>
  <div id="res"><div class="card lo"><div class="sp"></div>运行推理中...</div></div>
  <button class="btn" id="btn" onclick="run()">▶ 重新推理</button>
</div>
<script>
async function run(){
  btn.disabled=true; res.innerHTML='<div class="card lo"><div class="sp"></div>推理中...</div>';
  try{
    const d=await(await fetch("/api/infer")).json();
    qt.textContent=d.question;
    const c=["#667eea","#764ba2","#f093fb","#4facfe","#43e97b"];
    let h='<div class="card"><div class="label">🎯 候选答案</div>';
    d.candidates.forEach((x,i)=>{const p=(x.prob*100).toFixed(1);h+='<div class="row"><div class="name">'+(x.label||x.entity_id)+'</div><div class="barbg"><div class="bar" style="width:'+p+'%;background:'+c[i%5]+'"></div></div><div class="pct">'+p+'%</div></div>'});
    h+='</div><div class="card"><div class="label">🔗 推理路径</div>';
    d.paths.forEach((p,j)=>{if(j>0)h+='<div class="psep"></div>';const a=p.path.find(n=>n.entity_id===p.answer_entity_id);h+='<div class="ptop">→ '+(a?.label||p.answer_entity_id)+'</div><div class="pbody">';p.path.forEach((n,i)=>{if(n.entity_id){if(i>0)h+='<span class="ar"> → </span>';h+='<span class="e">'+(n.label||n.entity_id)+'</span>'}else if(n.relation_id){h+='<span class="ar"> → </span>';h+='<span class="r">'+(n.label||n.relation_id)+'</span>'}});h+='</div>'});
    h+='</div>'; res.innerHTML=h;
  }catch(e){res.innerHTML='<div class="card" style="color:#c33;padding:20px">请求失败: '+e.message+'</div>'}
  btn.disabled=false;
}
run();
</script>
</body>
</html>
